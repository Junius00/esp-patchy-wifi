repos:
# C/C++ formatting
-   repo: https://github.com/igrr/astyle_py.git
    rev: v1.1.0
    hooks:
    -   id: astyle_py
        args: ['--style=otbs', '--attach-namespaces', '--attach-classes', '--indent=spaces=4', '--convert-tabs', '--align-pointer=name', '--align-reference=name', '--keep-one-line-statements', '--pad-header', '--pad-oper']
        exclude: 'pb-c\.[ch]$'

# CMake formatting
-   repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
    -   id: cmake-format
        args:
        - '--config-files'
        - '.pre-commit/cmake-format_config.py'
        - '--in-place'

# Kconfig checks
-   repo: https://github.com/espressif/esp-idf-kconfig.git
    rev: v3.7.0
    hooks:
    -   id: check-kconfig-files
        exclude: '\.cmake$'
    -   id: check-deprecated-kconfig-options

# Spell checking
-   repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
    -   id: codespell
        args: ["-L", "Nome,pase,PASE,OT"]

# Insert license headers
-   repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
    -   id: insert-license  # Insert a short license disclaimer as a header comment in source
        name: Insert license header (.c,.cpp,.h)
        files: \.(c|cpp|h)$
        args:
            - --license-filepath
            - .pre-commit/license_header.txt
            - --comment-style
            - /*| *| */
            - --use-current-year
            - --fuzzy-match-generates-todo # Add TODOs for fuzzy matches

# Ensure end-of-file newline compliance
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: end-of-file-fixer
